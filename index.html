<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>دليل مقاعد الظل - المسار الذكي</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; }
        .bus-rotate { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [step, setStep] = useState(1); // 1: اختيار المسار، 2: النتائج والبوصلة
            const [fromCity, setFromCity] = useState('');
            const [toCity, setToCity] = useState('');
            const [heading, setHeading] = useState(0);
            const [sunAzimuth, setSunAzimuth] = useState(180);

            // حساب زاوية الشمس بناءً على الوقت الحالي
            useEffect(() => {
                const hour = new Date().getHours();
                setSunAzimuth(90 + ((hour - 6) * 15));
            }, []);

            const handleStart = () => {
                if(fromCity && toCity) setStep(2);
                else alert("يرجى إدخال مدينة الانطلاق والوصول");
            };

            const enableCompass = () => {
                if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission().then(res => {
                        if (res === 'granted') window.addEventListener('deviceorientation', e => setHeading(e.webkitCompassHeading || 360 - e.alpha));
                    });
                } else {
                    window.addEventListener('deviceorientation', e => setHeading(e.webkitCompassHeading || 360 - e.alpha));
                }
            };

            const getAdvice = () => {
                const diff = (sunAzimuth - heading + 360) % 360;
                if (diff > 20 && diff < 160) return { side: "اليسار", icon: "⬅️", color: "text-green-600", bg: "bg-green-50" };
                if (diff > 200 && diff < 340) return { side: "اليمين", icon: "➡️", color: "text-green-600", bg: "bg-green-50" };
                return { side: "الوسط", icon: "☀️", color: "text-orange-600", bg: "bg-orange-50" };
            };

            const advice = getAdvice();

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col p-4">
                    {step === 1 ? (
                        <div className="flex-1 flex flex-col justify-center space-y-6">
                            <div className="text-center space-y-2">
                                <h1 className="text-4xl font-black text-blue-600">أين الظل؟</h1>
                                <p className="text-gray-500 text-lg">خطط لرحلتك واجلس في المكان البارد</p>
                            </div>

                            <div className="bg-white p-6 rounded-3xl shadow-xl space-y-4 border border-gray-100">
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-gray-600 mr-2">نقطة الانطلاق</label>
                                    <input 
                                        type="text" 
                                        placeholder="مثلاً: الدار البيضاء" 
                                        className="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        value={fromCity}
                                        onChange={(e) => setFromCity(e.target.value)}
                                    />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-sm font-bold text-gray-600 mr-2">وجهة الوصول</label>
                                    <input 
                                        type="text" 
                                        placeholder="مثلاً: مراكش" 
                                        className="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                                        value={toCity}
                                        onChange={(e) => setToCity(e.target.value)}
                                    />
                                </div>
                                <button 
                                    onClick={handleStart}
                                    className="w-full bg-blue-600 text-white font-black py-5 rounded-2xl text-xl shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all"
                                >
                                    حساب أفضل مقعد 🚌
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="flex-1 space-y-6 animate-in fade-in duration-500">
                            <button onClick={() => setStep(1)} className="text-blue-600 font-bold flex items-center gap-2">
                                <span>🔙</span> تعديل المسار
                            </button>

                            <div className="bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
                                <div className="flex justify-between items-center mb-6">
                                    <div>
                                        <p className="text-xs text-gray-400 uppercase font-bold tracking-widest">المسار الحالي</p>
                                        <h2 className="text-xl font-black text-gray-800">{fromCity} ➔ {toCity}</h2>
                                    </div>
                                    <div className="bg-blue-100 text-blue-600 p-3 rounded-2xl font-bold">
                                        {new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                    </div>
                                </div>

                                <div className={`p-6 rounded-2xl ${advice.bg} border-2 border-dashed border-opacity-50 flex items-center justify-between mb-8`}>
                                    <div>
                                        <p className="text-sm text-gray-500 font-bold mb-1">اجلس في جهة:</p>
                                        <h3 className={`text-3xl font-black ${advice.color}`}>{advice.side} {advice.icon}</h3>
                                    </div>
                                    <span className="text-5xl">⛱️</span>
                                </div>

                                <div className="relative h-48 w-48 mx-auto flex items-center justify-center bg-slate-50 rounded-full border-4 border-white shadow-inner">
                                    <div className="bus-rotate" style={{ transform: `rotate(${-heading}deg)` }}>
                                        <span className="text-7xl block">🚌</span>
                                        <div className="absolute -top-8 left-1/2 -translate-x-1/2 font-black text-red-500 text-xl">N</div>
                                    </div>
                                </div>
                            </div>

                            <button 
                                onClick={enableCompass}
                                className="w-full bg-gray-800 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg"
                            >
                                🧭 تفعيل البوصلة أثناء الحركة
                            </button>
                            <p className="text-center text-xs text-gray-400">وجه الهاتف دائماً لزجاج الحافلة الأمامي للحصول على دقة 100%</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
